<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposalForge Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/proposalforge.css" rel="stylesheet">
    {% if css_file %}
    <link href="/static/react/{{ css_file }}" rel="stylesheet">
    {% endif %}
    <style>
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .pipeline-active-border { animation: pulse-border 2s ease-in-out infinite; }
        @keyframes pulse-border { 0%, 100% { border-color: var(--gold); } 50% { border-color: var(--gold-light); box-shadow: 0 0 8px rgba(212,168,67,0.4); } }
    </style>
</head>
<body>
    <script>
        window.__PF_CONFIG__ = { isAdmin: {{ is_admin | tojson }} };
    </script>
    <div id="root"></div>
    {% if debug %}
    <script type="module" src="http://localhost:5173/src/main.tsx"></script>
    {% else %}
    <script type="module" src="/static/react/{{ js_file }}"></script>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
