<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProposalForge Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/proposalforge.css" rel="stylesheet">
    {% if css_file %}
    <link href="/static/react/{{ css_file }}" rel="stylesheet">
    {% endif %}
    <style>
        /* Spinning badge icon */
        .spinning { animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Pulsing gold border + glow on running phase card */
        .pipeline-active-border {
            animation: pulse-border 1.5s ease-in-out infinite;
            border-width: 2px !important;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: var(--gold) !important; box-shadow: 0 0 4px rgba(212,168,67,0.3); }
            50% { border-color: var(--gold-light) !important; box-shadow: 0 0 16px rgba(212,168,67,0.6), 0 0 4px rgba(212,168,67,0.3) inset; }
        }

        /* Pulsating main icon on running card */
        .phase-icon-pulse { animation: icon-pulse 1.5s ease-in-out infinite; }
        @keyframes icon-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }

        /* Shimmer overlay on running card — contained without overflow:hidden */
        .pipeline-phase-card.pipeline-active-border::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,168,67,0.08), transparent);
            animation: shimmer 2s ease-in-out infinite;
            border-radius: inherit;
            pointer-events: none;
            clip-path: inset(0 round 0.5rem);
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Subtle background highlight for running card */
        .pipeline-phase-card.pipeline-active-border {
            background: linear-gradient(135deg, rgba(212,168,67,0.05), rgba(212,168,67,0.12));
        }
    </style>
</head>
<body>
    <script>
        window.__PF_CONFIG__ = { isAdmin: {{ is_admin | tojson }} };
    </script>
    <div id="root"></div>
    {% if debug %}
    <script type="module" src="http://localhost:5173/src/main.tsx"></script>
    {% else %}
    <script type="module" src="/static/react/{{ js_file }}"></script>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
